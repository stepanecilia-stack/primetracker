<html lang="ru">
<head>
    <meta charset="UTF-8">

    <style>

        .tooltip {

        .test-goal {

        .test-result {

            border-radius: 8px;
            margin-bottom: 16px;

        .test-result.gold {
            border-left-color: #4caf50;
            background: #e8f5e9;

            border-left-color: #ff9800;
            background: #fff3e0;
        }

        .test-result.red {
            border-left-color: #f44336;
            background: #ffebee;
        }

        .test-result-value {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .test-result-status {
            font-size: 13px;
            font-weight: 500;
        }

        .test-result-date {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .btn-submit-test {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 4px rgba(102, 126, 234, 0.3);
        }

        .btn-submit-test:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.4);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .error-message {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 20px;
            border-radius: 8px;

        .error-message a {
            color: #667eea;
            text-decoration: underline;

        }

        .modal {

            top: 0;
            left: 0;

            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 12px;
            padding: 32px;

            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3);

        .modal-header {
            font-size: 24px;

            justify-content: flex-end;

        .btn {

        .btn-primary {

        .btn-primary:hover {
            transform: translateY(-1px);

        @media (max-width: 768px) {

</head>
<body>
    <div class="container">
        <a href="#" id="back-btn" class="back-button">← Назад</a>

        <div class="header">
            <h1 id="athlete-name">Функциональная готовность</h1>
            <p id="athlete-meta">Тесты и нормативы</p>
        </div>

        <div id="tests-container" class="loading">
            Загрузка тестов...
        </div>
    </div>

    <!-- MODAL ДЛЯ СДАЧИ ТЕСТА -->
    <div id="testModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-header" id="modal-test-name">Сдача теста</h2>
            <form id="testForm">
                <div class="form-group">
                    <label for="test-result">Результат *</label>
                    <input type="number" id="test-result" step="0.01" required>
                    <small id="test-unit-hint" style="color: #6b7280; font-size: 12px; margin-top: 4px; display: block;"></small>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeTestModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
const firebaseConfig = {
    apiKey: "AIzaSyAxsNe0j6NxMwLDeWrFpvdqRbBHFg5gdiw",
    authDomain: "cartel-academy.firebaseapp.com",
    projectId: "cartel-academy",
    storageBucket: "cartel-academy.firebasestorage.app",
    messagingSenderId: "988659631950",
    appId: "1:988659631950:web:ffb7ec4d4b5e0ec440401f"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();
const auth = firebase.auth();

const NORMS_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSznwbE_UU03tW5O2ps783zQ_V6lXjGnx7IdqYCTfF7XRN6ioJ7EQ4kclNSyrok2Yu2CGXr4M4qGzcs/pub?gid=1658605285&single=true&output=csv';

let currentAthlete = null;
let currentNorms = [];
let currentTest = null;

async function loadNorms() {
    try {
        console.log('🔄 Загрузка нормативов из Google Sheets (functional.html)...');
        const response = await fetch(NORMS_SHEET_URL);
        const csvText = await response.text();
        
        console.log('CSV Raw Data:', csvText.substring(0, 500) + '...');
        
        const rows = csvText.split('\n').map(row => row.split(','));
        console.log(`📊 Всего строк в CSV: ${rows.length}`);
        
        const dataRows = rows.slice(1);
        
        const norms = [];
        dataRows.forEach((row, index) => {
            if (row.length < 11) {
                console.warn(`⚠️ Строка ${index + 2} пропущена (недостаточно колонок): ${row.length}`);
                return;
            }
            
            const [category, testId, testName, description, ageGroup, gender, gold, silver, bronze, unit, measureType] = row;
            
            norms.push({
                category: category.trim(),
                testId: testId.trim(),
                testName: testName.trim(),
                description: description.trim(),
                ageGroup: ageGroup.trim(),
                gender: gender.trim(),
                gold: parseFloat(gold),
                silver: parseFloat(silver),
                bronze: parseFloat(bronze),
                unit: unit.trim(),
                measureType: measureType.trim()
            });
        });
        
        console.log(`✅ Загружено нормативов: ${norms.length}`);
        
        return norms;
    } catch (error) {
        console.error('❌ Ошибка загрузки нормативов из Google Sheets:', error);
        return [];
    }
}

function getAthletNorms(allNorms, athlete, category) {
    const age = new Date().getFullYear() - Number(athlete.birthYear);
    const genderText = athlete.gender === 'M' ? 'М' : 'Ж';
    
    console.log(`🔍 Поиск нормативов: возраст=${age}, пол=${genderText}, категория=${category}`);
    
    const filtered = allNorms.filter(norm => {
        if (norm.category !== category) return false;
        if (norm.gender !== athlete.gender) return false;
        
        const ageParts = norm.ageGroup.split('-');
        if (ageParts.length !== 2) {
            console.warn(`⚠️ Некорректный формат возрастной группы: ${norm.ageGroup}`);
            return false;
        }
        
        const minAge = parseInt(ageParts[0]);
        const maxAge = parseInt(ageParts[1]);
        
        return age >= minAge && age <= maxAge;
    });
    
    console.log(`📋 Найдено нормативов: ${filtered.length}`);
    
    return filtered;
}

function evaluateTest(result, norm) {
    const { gold, silver, bronze, measureType } = norm;
    
    let status, normalizedScore;
    
    if (measureType === 'MAX') {
        if (result >= gold) {
            status = 'gold';
            normalizedScore = 100 + ((result - gold) / gold) * 20;
        } else if (result >= silver) {
            status = 'silver';
            normalizedScore = 80 + ((result - silver) / (gold - silver)) * 20;
        } else if (result >= bronze) {
            status = 'bronze';
            normalizedScore = 60 + ((result - bronze) / (silver - bronze)) * 20;
        } else {
            status = 'red';
            normalizedScore = (result / bronze) * 60;
        }
    } else {
        if (result <= gold) {
            status = 'gold';
            normalizedScore = 100 + ((gold - result) / gold) * 20;
        } else if (result <= silver) {
            status = 'silver';
            normalizedScore = 80 + ((silver - result) / (silver - gold)) * 20;
        } else if (result <= bronze) {
            status = 'bronze';
            normalizedScore = 60 + ((bronze - result) / (bronze - silver)) * 20;
        } else {
            status = 'red';
            normalizedScore = (bronze / result) * 60;
        }
    }
    
    normalizedScore = Math.max(0, Math.min(120, normalizedScore));
    
    return {
        status,
        normalizedScore: Math.round(normalizedScore)
    };
}

function getStatusText(status) {
    const texts = {
        gold: '🥇 Золото (Элита)',
        silver: '🥈 Серебро (Норма)',
        bronze: '🥉 Бронза (Ниже нормы)',
        red: '🔴 Критическое отставание'
    };
    return texts[status] || 'Не оценено';
}

function renderTests(norms, athlete) {
    const container = document.getElementById('tests-container');
    container.innerHTML = '';
    container.className = 'tests-grid';
    
    if (norms.length === 0) {
        const age = new Date().getFullYear() - Number(athlete.birthYear);
        const genderText = athlete.gender === 'M' ? 'Мужской' : 'Женский';
        
        container.innerHTML = `
            <div class="error-message">
                📋 Нормативы для возраста <strong>${age} лет</strong> и пола <strong>${genderText}</strong> еще не внесены в таблицу.
                <br><br>
                Обратитесь к администратору системы для добавления нормативов.
            </div>
        `;
        return;
    }
    
    const ageRange = norms[0].ageGroup;
    const targetAge = parseInt(ageRange.split('-')[1]);
    
    norms.forEach(norm => {
        const card = document.createElement('div');
        card.className = 'test-card';
        
        const existingTest = athlete.tests?.functional?.[norm.testId];
        
        let resultHTML = '';
        if (existingTest) {
            resultHTML = `
                <div class="test-result ${existingTest.status}">
                    <div class="test-result-value">${existingTest.result} ${norm.unit}</div>
                    <div class="test-result-status">${getStatusText(existingTest.status)}</div>
                    <div class="test-result-date">Дата: ${existingTest.date}</div>
                </div>
            `;
        }
        
        card.innerHTML = `
            <div class="test-category-badge">Категория: ${ageRange} лет (Цель: ${targetAge} лет)</div>
            
            <div class="test-header">
                <h3 class="test-title">${norm.testName}</h3>
                <div class="info-icon">
                    ℹ️
                    <div class="tooltip">${norm.description}</div>
                </div>
            </div>
            
            <div class="test-goal">
                <div class="test-goal-label">Цель (Золото)</div>
                <div class="test-goal-value">${norm.gold} ${norm.unit}</div>
            </div>
            
            ${resultHTML}
            
            <button class="btn-submit-test" onclick="openTestModal('${norm.testId}', '${norm.testName}', '${norm.unit}')">
                ${existingTest ? 'Пересдать тест' : 'Сдать тест'}
            </button>
        `;
        
        container.appendChild(card);
    });
}

function openTestModal(testId, testName, unit) {
    const norm = currentNorms.find(n => n.testId === testId);
    if (!norm) return;
    
    currentTest = norm;
    document.getElementById('modal-test-name').textContent = testName;
    document.getElementById('test-unit-hint').textContent = `Укажите результат в ${unit}`;
    document.getElementById('testModal').classList.add('active');
    document.getElementById('test-result').value = '';
    document.getElementById('test-result').focus();
}

function closeTestModal() {
    document.getElementById('testModal').classList.remove('active');
    currentTest = null;
}

async function recalculateKSR(athleteId) {
    console.log('🔄 Пересчет КСР после сдачи теста...');
    console.log('═══════════════════════════════════════');
    
    try {
        const doc = await db.collection('students').doc(athleteId).get();
        if (!doc.exists) return;
        
        const athlete = { id: doc.id, ...doc.data() };
        
        let physicsScore = 0;
        let functionalScore = 0;
        let technicalScore = 0;
        
        const allNorms = await loadNorms();
        const physicalNorms = getAthletNorms(allNorms, athlete, 'physical');
        const functionalNorms = getAthletNorms(allNorms, athlete, 'functional');
        
        const totalPhysicalTests = physicalNorms.length;
        const totalFunctionalTests = functionalNorms.length;
        
        if (totalPhysicalTests > 0) {
            let sumPhysics = 0;
            let completedPhysics = 0;
            
            physicalNorms.forEach(norm => {
                const testResult = athlete.tests?.physical?.[norm.testId];
                if (testResult) {
                    sumPhysics += testResult.normalizedScore || 0;
                    completedPhysics++;
                }
            });
            
            const avgPhysics = sumPhysics / totalPhysicalTests;
            physicsScore = avgPhysics * 0.333;
            
            console.log(`💪 ФИЗИКА:`);
            console.log(`  Сдано: ${completedPhysics} из ${totalPhysicalTests} тестов`);
            console.log(`  Сумма баллов: ${sumPhysics}`);
            console.log(`  Средний балл: ${avgPhysics.toFixed(2)} (штраф за ${totalPhysicalTests - completedPhysics} несданных)`);
            console.log(`  Вклад в КСР: ${physicsScore.toFixed(2)}`);
        }
        
        if (totalFunctionalTests > 0) {
            let sumFunctional = 0;
            let completedFunctional = 0;
            
            functionalNorms.forEach(norm => {
                const testResult = athlete.tests?.functional?.[norm.testId];
                if (testResult) {
                    sumFunctional += testResult.normalizedScore || 0;
                    completedFunctional++;
                }
            });
            
            const avgFunctional = sumFunctional / totalFunctionalTests;
            functionalScore = avgFunctional * 0.333;
            
            console.log(`⚡ ФУНКЦИОНАЛ:`);
            console.log(`  Сдано: ${completedFunctional} из ${totalFunctionalTests} тестов`);
            console.log(`  Сумма баллов: ${sumFunctional}`);
            console.log(`  Средний балл: ${avgFunctional.toFixed(2)} (штраф за ${totalFunctionalTests - completedFunctional} несданных)`);
            console.log(`  Вклад в КСР: ${functionalScore.toFixed(2)}`);
        }
        
        if (athlete.technicalScore && typeof athlete.technicalScore === 'number') {
            technicalScore = athlete.technicalScore * 100 * 0.333;
            console.log(`🥊 ТЕХНИКА:`);
            console.log(`  Оценка: ${(athlete.technicalScore * 100).toFixed(0)}%`);
            console.log(`  Вклад в КСР: ${technicalScore.toFixed(2)}`);
        }
        
        const totalScore = physicsScore + functionalScore + technicalScore;
        const realization = totalScore === 0 ? "Нет данных" : Math.round(totalScore);
        
        const potential = athlete.metrics?.potential || 0;
        const gap = realization === "Нет данных" ? "Нет данных" : potential - realization;
        
        console.log(`\n🎯 ИТОГОВЫЙ КСР: ${realization}%`);
        console.log(`📊 Разрыв: ${gap}`);
        console.log('═══════════════════════════════════════');
        
        await db.collection('students').doc(athleteId).update({
            'metrics.realization': realization,
            'metrics.gap': gap
        });
        
        console.log('✅ Метрики обновлены в Firebase');
        
    } catch (error) {
        console.error('❌ Ошибка пересчета КСР:', error);
    }
}

document.getElementById('testForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    if (!currentTest || !currentAthlete) return;
    
    const result = parseFloat(document.getElementById('test-result').value);
    const evaluation = evaluateTest(result, currentTest);
    
    console.log(`💾 Сохранение теста: ${currentTest.testName}, результат=${result}, статус=${evaluation.status}`);
    
    const testData = {
        result: result,
        date: new Date().toISOString().split('T')[0],
        status: evaluation.status,
        normalizedScore: evaluation.normalizedScore
    };
    
    try {
        const athleteRef = db.collection('students').doc(currentAthlete.id);
        const doc = await athleteRef.get();
        
        if (!doc.exists) {
            console.error(`❌ Student ID [${currentAthlete.id}] not found in 'students' collection`);
            alert('❌ Спортсмен не найден');
            return;
        }
        
        const data = doc.data();
        const tests = data.tests || { physical: {}, functional: {} };
        if (!tests.functional) tests.functional = {};
        tests.functional[currentTest.testId] = testData;
        
        await athleteRef.update({ tests });
        
        console.log('✅ Тест сохранен в коллекции students');
        
        await recalculateKSR(currentAthlete.id);
        
        currentAthlete.tests = tests;
        
        closeTestModal();
        renderTests(currentNorms, currentAthlete);
        
        alert('✅ Результат сохранен и КСР обновлен!');
    } catch (error) {
        console.error('❌ Ошибка сохранения в коллекцию students:', error);
        alert('❌ Ошибка сохранения результата');
    }
});

async function waitForAuth() {
    return new Promise((resolve) => {
        const unsubscribe = auth.onAuthStateChanged(user => {
            unsubscribe();
            resolve(user);
        });
    });
}

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const athleteId = urlParams.get('id');
    
    console.log('🚀 Инициализация functional.html');
    console.log('📌 Athlete ID из URL:', athleteId);
    
    // ✅ НАСТРОЙКА КНОПКИ "НАЗАД"
    const backBtn = document.getElementById('back-btn');
    if (athleteId) {
        backBtn.href = `index.html#profile-${athleteId}`;
        backBtn.onclick = (e) => {
            e.preventDefault();
            window.location.href = `index.html#profile-${athleteId}`;
        };
    } else {
        backBtn.href = 'index.html';
    }
    
    if (!athleteId) {
        console.error('❌ ID спортсмена не указан в URL');
        document.getElementById('tests-container').innerHTML = '<div class="error-message">ID спортсмена не указан в URL</div>';
        return;
    }
    
    console.log('🔐 Проверка авторизации...');
    const user = await waitForAuth();
    
    if (!user) {
        console.error('❌ Пользователь не авторизован');
        document.getElementById('tests-container').innerHTML = `
            <div class="error-message">
                ❌ Вы не авторизованы. <a href="index.html">Войдите в систему</a>
            </div>
        `;
        return;
    }
    
    console.log(`✅ Пользователь авторизован: ${user.email}`);
    
    try {
        console.log(`🔍 Поиск спортсмена в коллекции 'students' с ID: ${athleteId}`);
        
        const doc = await db.collection('students').doc(athleteId).get();
        
        if (!doc.exists) {
            console.error(`❌ Student ID [${athleteId}] not found in 'students' collection`);
            document.getElementById('tests-container').innerHTML = `
                <div class="error-message">
                    ❌ Спортсмен с ID <code>${athleteId}</code> не найден в коллекции 'students'
                </div>
            `;
            return;
        }
        
        currentAthlete = { id: doc.id, ...doc.data() };
        
        if (currentAthlete.coachId !== user.uid) {
            console.error('❌ У вас нет прав доступа к этому спортсмену');
            document.getElementById('tests-container').innerHTML = `
                <div class="error-message">
                    ❌ У вас нет прав доступа к этому спортсмену
                </div>
            `;
            return;
        }
        
        console.log(`✅ Спортсмен найден: ${currentAthlete.firstName} ${currentAthlete.lastName}`);
        console.log('📊 Данные спортсмена:', currentAthlete);
        
        document.getElementById('athlete-name').textContent = `${currentAthlete.firstName} ${currentAthlete.lastName} — Функциональная готовность`;
        
        const allNorms = await loadNorms();
        
        if (allNorms.length === 0) {
            console.error('❌ Не удалось загрузить нормативы из Google Sheets');
            document.getElementById('tests-container').innerHTML = `
                <div class="error-message">
                    ❌ Не удалось загрузить нормативы из Google Sheets. Проверьте:
                    <ul style="margin-top: 12px; text-align: left;">
                        <li>Опубликована ли таблица (Файл → Опубликовать в Интернете)</li>
                        <li>Выбран ли формат CSV</li>
                        <li>Корректна ли ссылка NORMS_SHEET_URL</li>
                    </ul>
                </div>
            `;
            return;
        }
        
        currentNorms = getAthletNorms(allNorms, currentAthlete, 'functional');
        
        renderTests(currentNorms, currentAthlete);
        
    } catch (error) {
        console.error('❌ Критическая ошибка при инициализации:', error);
        
        let errorDetails = error.message;
        if (error.code === 'permission-denied') {
            errorDetails = `
                <strong>Ошибка прав доступа Firebase</strong>
                <br><br>
                <strong>Решение:</strong>
                <ol style="margin-top: 12px; text-align: left;">
                    <li>Откройте <a href="https://console.firebase.google.com/project/cartel-academy/firestore/rules" target="_blank">Firebase Console → Firestore → Правила</a></li>
                    <li>Скопируйте правила из инструкции ниже</li>
                    <li>Нажмите "Опубликовать"</li>
                </ol>
                <br>
                <details style="margin-top: 12px;">
                    <summary style="cursor: pointer; font-weight: 600;">Показать правила безопасности</summary>
                    <pre style="background: #1a1a2e; color: #4caf50; padding: 12px; border-radius: 8px; overflow-x: auto; margin-top: 8px; font-size: 12px;">
rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /coaches/{coachId} {
      allow read, write: if request.auth != null && request.auth.uid == coachId;
    }
    match /students/{studentId} {
      allow read: if request.auth != null && 
                     (resource.data.coachId == request.auth.uid || 
                      resource.data.shareToken != null);
      allow create: if request.auth != null && 
                       request.resource.data.coachId == request.auth.uid;
      allow update, delete: if request.auth != null && 
                               resource.data.coachId == request.auth.uid;
    }
  }
}</pre>
                </details>
            `;
        }
        
        document.getElementById('tests-container').innerHTML = `
            <div class="error-message">
                ❌ ${errorDetails}
                <br><br>
                <small>Откройте консоль браузера (F12 → Console) для подробностей.</small>
            </div>
        `;
    }
}

window.addEventListener('DOMContentLoaded', init);
</script>
