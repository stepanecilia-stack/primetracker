<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muscle Detail — Cartel Boxing Academy</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink: #111111;
            --ink-soft: #555555;
            --bg: #FFFFFF;
            --card: #F7F7F7;
            --border: #DDDDDD;
            --accent: #4CAF50;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: 'Inter', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 32px 20px;
        }
        .detail {
            width: 100%;
            max-width: 640px;
        }
        .detail__back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--ink);
            background: #F0F0F0;
            border: 1px solid #CCCCCC;
            border-radius: 6px;
            padding: 8px 16px;
            margin-bottom: 24px;
            cursor: pointer;
            text-decoration: none;
        }
        .detail__back:hover { background: #E8E8E8; }
        .detail__kicker {
            font-size: 10px;
            letter-spacing: 2.4px;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin: 0 0 6px;
        }
        .detail__title {
            font-family: 'Bebas Neue', 'Inter', system-ui, sans-serif;
            font-size: 56px;
            line-height: 1;
            letter-spacing: 0.02em;
            margin: 0 0 24px;
        }
        .detail__section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--ink-soft);
            text-transform: uppercase;
            margin: 28px 0 8px;
        }
        .detail__card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 18px;
            font-size: 15px;
            line-height: 1.45;
        }
        .detail__muted {
            color: var(--ink-soft);
            font-style: italic;
        }
    </style>
</head>
<body>
    <main class="detail">
        <a href="index.html" class="detail__back">← Назад</a>

        <p class="detail__kicker">Мышца</p>
        <h1 class="detail__title" id="muscle-name">—</h1>

        <div class="detail__section-label">Норматив ГТО</div>
        <div class="detail__card" id="muscle-norm">
            <span class="detail__muted">Норматив не указан</span>
        </div>

        <div class="detail__section-label">Описание</div>
        <div class="detail__card detail__muted">
            Placeholder — детальная страница будет расширена (упражнения, видео, методика,
            персональная оценка). Пока отображаем только данные, переданные из карты мышц.
        </div>
    </main>

    <script>
    (function () {
        'use strict';

        const params = new URLSearchParams(window.location.search);
        const muscle = params.get('muscle') || '';
        const norm   = params.get('norm')   || '';

        const nameEl = document.getElementById('muscle-name');
        const normEl = document.getElementById('muscle-norm');

        if (muscle) {
            nameEl.textContent = muscle;
            document.title = muscle + ' — Cartel Boxing Academy';
        } else {
            nameEl.textContent = 'Мышца не указана';
        }

        if (norm) {
            normEl.textContent = norm;
            normEl.classList.remove('detail__muted');
        }
    })();
    </script>
</body>
</html>
