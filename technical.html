    }

async function loadTechnicalAtoms() {
    try {
        console.log('🔄 Загрузка технических атомов из Google Sheets...');
        const response = await fetch(TECHNICAL_SHEET_URL);
        const csvText = await response.text();
        
        const rows = csvText.split('\n').map(row => {
            return row.split(',').map(cell => cell.trim().replace(/^"|"$/g, ''));
        });
        
        console.log(`📊 Загружено строк: ${rows.length}`);
        
        const dataRows = rows.slice(1);
        
        const atoms = [];
        dataRows.forEach((row, index) => {
            if (row.length < 7) {
                console.warn(`⚠️ Строка ${index + 2} пропущена (недостаточно колонок)`);
                return;
            }
            
            const [number, name, howTo, whyHowTo, mistakes, whyMistakes, videoLink] = row;
            
            if (!name || name.trim() === '') return;
            
            atoms.push({
                id: `atom_${number || index}`,
                number: number || (index + 1).toString(),
                name: name.trim(),
                howTo: howTo.trim(),
                whyHowTo: whyHowTo.trim(),
                mistakes: mistakes.trim(),
                whyMistakes: whyMistakes.trim(),
                videoLink: videoLink.trim()
            });
        });
        
        console.log(`✅ Загружено атомов: ${atoms.length}`);
        return atoms;
        
    } catch (error) {
        console.error('❌ Ошибка загрузки данных из Google Sheets:', error);
        return [];
    }
}

async function loadAthleteData(athleteId) {
    try {
        if (!auth.currentUser) {
            console.error('❌ Пользователь не авторизован');
            return null;
        }
        
        console.log(`🔍 Загрузка данных спортсмена ${athleteId}`);
        
        const doc = await db.collection('students').doc(athleteId).get();
        
        if (!doc.exists) {
            console.error(`❌ Спортсмен ${athleteId} не найден`);
            return null;
        }
        
        const data = doc.data();
        
        if (data.coachId !== auth.currentUser.uid) {
            console.error(`❌ Доступ запрещён`);
            return null;
        }
        
        console.log(`✅ Данные спортсмена загружены`);
        
        return {
            id: doc.id,
            ...data,
            technicalData: data.technicalData || {}
        };
        
    } catch (error) {
        console.error('❌ Ошибка загрузки данных спортсмена:', error);
        return null;
    }
}

function renderLevelTooltip(level) {
    let content = `<h4>${level.emoji} ${level.name}</h4>`;
    content += `<p>${level.description}</p>`;
    
    if (level.details) {
        content += '<ul>';
        level.details.forEach(detail => {
            content += `<li data-icon="${detail.icon}">${detail.text}</li>`;
        });
        content += '</ul>';
    }
    
    return content;
}

function openVideo(link) {

function calculateTechnicalKSR() {
    if (technicalAtoms.length === 0) {
        return 0;
    }
    
    let totalKSR = 0;
    let count = 0;
    
    technicalAtoms.forEach(atom => {
        const data = athleteTechnicalData[atom.id];
        const level = data ? data.level : 0;
        const levelConfig = LEVELS.find(l => l.value === level);
        
        if (levelConfig) {
            totalKSR += levelConfig.ksr;
            count++;
        }
    });
    
    return count > 0 ? (totalKSR / count) : 0;
}

function renderOverallScore() {
    const ksr = calculateTechnicalKSR();
    const percentage = Math.round(ksr * 100);
    
    const completedAtoms = Object.keys(athleteTechnicalData).filter(key => {
        return athleteTechnicalData[key].level > 0;
    }).length;
    
    return `
        <div class="overall-score-card">
            <div class="overall-score-label">Средний уровень технической подготовки</div>
            <div class="overall-score-value">${percentage}%</div>
            <div class="overall-score-description">
                Оценено атомов: ${completedAtoms} из ${technicalAtoms.length}
            </div>
        </div>
    `;
}

            if (infoIcon) {
                e.stopPropagation();
                const tooltipId = `tooltip-${atomId}-${level}`;
                const tooltip = document.getElementById(tooltipId);
                
                document.querySelectorAll('.level-tooltip').forEach(t => {
                    if (t.id !== tooltipId) {
                        t.classList.remove('show');
                    }
                });
                
                tooltip.classList.toggle('show');
                return;
            }
            
            hideAllTooltips();
            
            selector.querySelectorAll('.level-option').forEach(opt => {
                opt.classList.remove('active');
            });
            
            option.classList.add('active');
            
            if (!athleteTechnicalData[atomId]) {
                athleteTechnicalData[atomId] = {};
            }
            athleteTechnicalData[atomId].level = level;
            
            console.log(`Уровень атома ${atomId} установлен на ${level}`);
        });
    });
    
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.level-option')) {
            hideAllTooltips();
        }
    });
}

async function saveAllData() {
    if (!currentAthlete) return;
    
    try {
        document.querySelectorAll('textarea[data-atom-id]').forEach(textarea => {
            const atomId = textarea.dataset.atomId;
            const comment = textarea.value.trim();
            
            if (!athleteTechnicalData[atomId]) {
                athleteTechnicalData[atomId] = { level: 0 };
            }
            athleteTechnicalData[atomId].comment = comment;
        });
        
        const technicalKSR = calculateTechnicalKSR();
        
        console.log('💾 Сохранение данных:', {
            technicalData: athleteTechnicalData,
            technicalKSR: technicalKSR
        });
        
        await db.collection('students').doc(currentAthlete.id).update({
            technicalData: athleteTechnicalData,
            technicalScore: technicalKSR
        });
        
        console.log('✅ Данные успешно сохранены');
        
        const successMsg = document.getElementById('success-msg');
        successMsg.classList.add('show');
        setTimeout(() => {
            successMsg.classList.remove('show');
        }, 3000);
        
        renderContent();
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
    } catch (error) {
        console.error('❌ Ошибка сохранения:', error);
        alert('❌ Ошибка сохранения данных');
    }
}

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const athleteId = urlParams.get('id');
    
    // ✅ НАСТРОЙКА КНОПКИ "НАЗАД"
    const backBtn = document.getElementById('back-btn');
    if (athleteId) {
        backBtn.href = `index.html#profile-${athleteId}`;
        backBtn.onclick = (e) => {
            e.preventDefault();
            window.location.href = `index.html#profile-${athleteId}`;
        };
    } else {
        backBtn.href = 'index.html';
    }
    
    if (!athleteId) {
        document.getElementById('main-content').innerHTML = '<div class="loading">ID спортсмена не указан</div>';
        return;
    }
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            console.error('❌ Пользователь не авторизован');
            document.getElementById('main-content').innerHTML = `
                <div class="loading" style="color: #e74c3c;">
                    <h2>⚠️ Требуется авторизация</h2>
                    <p>Для доступа к этой странице необходимо войти в систему.</p>
                    <a href="index.html" style="display: inline-block; margin-top: 20px; padding: 12px 24px; background: #667eea; color: white; text-decoration: none; border-radius: 8px;">
                        Вернуться на главную
                    </a>
                </div>
            `;
            return;
        }
        
        console.log(`✅ Пользователь авторизован: ${user.email}`);
        
        try {
            technicalAtoms = await loadTechnicalAtoms();
            
            if (technicalAtoms.length === 0) {
                document.getElementById('main-content').innerHTML = '<div class="loading">Не удалось загрузить данные из Google Sheets</div>';
                return;
            }
            
            currentAthlete = await loadAthleteData(athleteId);
            
            if (!currentAthlete) {
                document.getElementById('main-content').innerHTML = `
                    <div class="loading" style="color: #e74c3c;">
                        <h2>⚠️ Спортсмен не найден</h2>
                        <p>Возможно, спортсмен был удалён или у вас нет доступа к этому профилю.</p>
                        <a href="index.html" style="display: inline-block; margin-top: 20px; padding: 12px 24px; background: #667eea; color: white; text-decoration: none; border-radius: 8px;">
                            Вернуться на главную
                        </a>
                    </div>
                `;
                return;
            }
            
            athleteTechnicalData = currentAthlete.technicalData || {};
            
            document.getElementById('athlete-name').textContent = `${currentAthlete.firstName} ${currentAthlete.lastName} — Техническая подготовленность`;
            
            renderContent();
            
        } catch (error) {
            console.error('❌ Ошибка:', error);
            document.getElementById('main-content').innerHTML = '<div class="loading">Ошибка загрузки данных</div>';
        }
    });
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
