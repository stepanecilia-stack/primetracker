    <div id="testModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-header" id="modal-test-name">Сдача теста</h2>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeTestModal()">Отмена</button>

    <script>
const firebaseConfig = {
    apiKey: "AIzaSyAxsNe0j6NxMwLDeWrFpvdqRbBHFg5gdiw",
    authDomain: "cartel-academy.firebaseapp.com",
    projectId: "cartel-academy",
    storageBucket: "cartel-academy.firebasestorage.app",
    messagingSenderId: "988659631950",
    appId: "1:988659631950:web:ffb7ec4d4b5e0ec440401f"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();

const NORMS_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSznwbE_UU03tW5O2ps783zQ_V6lXjGnx7IdqYCTfF7XRN6ioJ7EQ4kclNSyrok2Yu2CGXr4M4qGzcs/pub?gid=1658605285&single=true&output=csv';

let currentAthlete = null;
let currentNorms = [];
let currentTest = null;

async function loadNorms() {
    try {
        console.log('🔄 Загрузка нормативов из Google Sheets (physical.html)...');
        const response = await fetch(NORMS_SHEET_URL);
        const csvText = await response.text();
        
        // ✅ ЛОГИРОВАНИЕ RAW DATA
        console.log('CSV Raw Data:', csvText.substring(0, 500) + '...');
        
        const rows = csvText.split('\n').map(row => row.split(','));
        console.log(`📊 Всего строк в CSV: ${rows.length}`);
        
        const dataRows = rows.slice(1);
        
        const norms = [];
        dataRows.forEach((row, index) => {
            if (row.length < 11) {
                console.warn(`⚠️ Строка ${index + 2} пропущена (недостаточно колонок): ${row.length}`);
                return;
            }
            
            const [category, testId, testName, description, ageGroup, gender, gold, silver, bronze, unit, measureType] = row;
            
            norms.push({
                category: category.trim(),
                testId: testId.trim(),
                testName: testName.trim(),
                description: description.trim(),
                ageGroup: ageGroup.trim(),
                gender: gender.trim(),
                gold: parseFloat(gold),
                silver: parseFloat(silver),
                bronze: parseFloat(bronze),
                unit: unit.trim(),
                measureType: measureType.trim()
            });
        });
        
        console.log(`✅ Загружено нормативов: ${norms.length}`);
        
        return norms;
    } catch (error) {
        console.error('❌ Ошибка загрузки нормативов из Google Sheets:', error);
        return [];
    }
}

// ✅ ЛОГИКА ВЕРХНЕЙ КРОМКИ
function getAthletNorms(allNorms, athlete, category) {
    const age = new Date().getFullYear() - Number(athlete.birthYear);
    const genderText = athlete.gender === 'M' ? 'М' : 'Ж';
    
    console.log(`🔍 Поиск нормативов: возраст=${age}, пол=${genderText}, категория=${category}`);
    
    const filtered = allNorms.filter(norm => {
        if (norm.category !== category) return false;
        if (norm.gender !== athlete.gender) return false;
        
        // Парсинг возрастной группы
        const ageParts = norm.ageGroup.split('-');
        if (ageParts.length !== 2) {
            console.warn(`⚠️ Некорректный формат возрастной группы: ${norm.ageGroup}`);
            return false;
        }
        
        const minAge = parseInt(ageParts[0]);
        const maxAge = parseInt(ageParts[1]);
        
        // ✅ ВЕРХНЯЯ КРОМКА: Возраст должен попадать в диапазон
        return age >= minAge && age <= maxAge;
    });
    
    console.log(`📋 Найдено нормативов: ${filtered.length}`);
    
    return filtered;
}

function evaluateTest(result, norm) {
    const { gold, silver, bronze, measureType } = norm;
    
    let status, normalizedScore;
    
    if (measureType === 'MAX') {
        // Больше = Лучше
        if (result >= gold) {
            status = 'gold';
            normalizedScore = 100 + ((result - gold) / gold) * 20;
        } else if (result >= silver) {
            status = 'silver';
            normalizedScore = 80 + ((result - silver) / (gold - silver)) * 20;
        } else if (result >= bronze) {
            status = 'bronze';
            normalizedScore = 60 + ((result - bronze) / (silver - bronze)) * 20;
        } else {
            status = 'red';
            normalizedScore = (result / bronze) * 60;
        }
    } else {
        // Меньше = Лучше (MIN)
        if (result <= gold) {
            status = 'gold';
            normalizedScore = 100 + ((gold - result) / gold) * 20;
        } else if (result <= silver) {
            status = 'silver';
            normalizedScore = 80 + ((silver - result) / (silver - gold)) * 20;
        } else if (result <= bronze) {
            status = 'bronze';
            normalizedScore = 60 + ((bronze - result) / (bronze - silver)) * 20;
        } else {
            status = 'red';
            normalizedScore = (bronze / result) * 60;
        }
    }
    
    normalizedScore = Math.max(0, Math.min(120, normalizedScore));
    
    return {
        status,
        normalizedScore: Math.round(normalizedScore)
    };
}

function getStatusText(status) {
    const texts = {
        gold: '🥇 Золото (Элита)',
        silver: '🥈 Серебро (Норма)',
        bronze: '🥉 Бронза (Ниже нормы)',
        red: '🔴 Критическое отставание'
    };
    return texts[status] || 'Не оценено';
}

function renderTests(norms, athlete) {
    const container = document.getElementById('tests-container');
    container.innerHTML = '';
    container.className = 'tests-grid';
    
    if (norms.length === 0) {
        const age = new Date().getFullYear() - Number(athlete.birthYear);
        const genderText = athlete.gender === 'M' ? 'Мужской' : 'Женский';
        
        container.innerHTML = `
            <div class="error-message">
                📋 Нормативы для возраста <strong>${age} лет</strong> и пола <strong>${genderText}</strong> еще не внесены в таблицу.
                <br><br>
                Обратитесь к администратору системы для добавления нормативов.
            </div>
        `;
        return;
    }
    
    // ✅ ПОЛУЧАЕМ ЦЕЛЕВОЙ ВОЗРАСТ (верхняя кромка диапазона)
    const ageRange = norms[0].ageGroup;
    const targetAge = parseInt(ageRange.split('-')[1]);
    const currentAge = new Date().getFullYear() - Number(athlete.birthYear);
    
    norms.forEach(norm => {
        const card = document.createElement('div');
        card.className = 'test-card';
        
        const existingTest = athlete.tests?.physical?.[norm.testId];
        
        let resultHTML = '';
        if (existingTest) {
            resultHTML = `
                <div class="test-result ${existingTest.status}">
                    <div class="test-result-value">${existingTest.result} ${norm.unit}</div>
                    <div class="test-result-status">${getStatusText(existingTest.status)}</div>
                    <div class="test-result-date">Дата: ${existingTest.date}</div>
                </div>
            `;
        }
        
        card.innerHTML = `
            <div class="test-category-badge">Категория: ${ageRange} лет (Цель: ${targetAge} лет)</div>
            
            <div class="test-header">
                <h3 class="test-title">${norm.testName}</h3>
                <div class="info-icon">
                    ℹ️
                    <div class="tooltip">${norm.description}</div>
                </div>
            </div>
            
            <div class="test-goal">
                <div class="test-goal-label">Цель (Золото)</div>
                <div class="test-goal-value">${norm.gold} ${norm.unit}</div>
            </div>
            
            ${resultHTML}
            
            <button class="btn-submit-test" onclick="openTestModal('${norm.testId}', '${norm.testName}', '${norm.unit}')">
                ${existingTest ? 'Пересдать тест' : 'Сдать тест'}
            </button>
        `;
        
        container.appendChild(card);
    });
}

function openTestModal(testId, testName, unit) {
    const norm = currentNorms.find(n => n.testId === testId);
    if (!norm) return;
    
    currentTest = norm;
    document.getElementById('modal-test-name').textContent = testName;
    document.getElementById('test-unit-hint').textContent = `Укажите результат в ${unit}`;
    document.getElementById('testModal').classList.add('active');
    document.getElementById('test-result').value = '';
    document.getElementById('test-result').focus();
}

function closeTestModal() {
    document.getElementById('testModal').classList.remove('active');
    currentTest = null;
}

// ✅ СИНХРОНИЗАЦИЯ КСР ПРИ СОХРАНЕНИИ
async function recalculateKSR(athleteId) {
    console.log('🔄 Пересчет КСР после сдачи теста...');
    
    try {
        const doc = await db.collection('students').doc(athleteId).get();
        if (!doc.exists) return;
        
        const athlete = { id: doc.id, ...doc.data() };
        
        // Расчет КСР
        let physicsScore = 0;
        let functionalScore = 0;
        let technicalScore = 0;
        
        if (athlete.tests?.physical) {
            const tests = Object.values(athlete.tests.physical);
            if (tests.length > 0) {
                const avg = tests.reduce((sum, t) => sum + t.normalizedScore, 0) / tests.length;
                physicsScore = avg * 0.333;
            }
        }
        
        if (athlete.tests?.functional) {
            const tests = Object.values(athlete.tests.functional);
            if (tests.length > 0) {
                const avg = tests.reduce((sum, t) => sum + t.normalizedScore, 0) / tests.length;
                functionalScore = avg * 0.333;
            }
        }
        
        if (athlete.technicalScore) {
            technicalScore = ((athlete.technicalScore / 5) * 100) * 0.333;
        }
        
        const totalScore = physicsScore + functionalScore + technicalScore;
        const realization = totalScore === 0 ? "Нет данных" : Math.round(totalScore);
        
        // Расчет потенциала
        let potential = 0;
        if (athlete.anthropometry?.length > 0) {
            const latest = athlete.anthropometry[athlete.anthropometry.length - 1];
            // (Используем существующую логику из главного script.js)
            potential = 100; // Упрощенно, в реальности нужна полная формула
        }
        
        const gap = realization === "Нет данных" ? "Нет данных" : potential - realization;
        
        await db.collection('students').doc(athleteId).update({
            metrics: { potential, realization, gap }
        });
        
        console.log('✅ КСР обновлен:', { potential, realization, gap });
        
    } catch (error) {
        console.error('❌ Ошибка пересчета КСР:', error);
    }
}

document.getElementById('testForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    if (!currentTest || !currentAthlete) return;
    
    const result = parseFloat(document.getElementById('test-result').value);
    const evaluation = evaluateTest(result, currentTest);
    
    const testData = {
        result: result,
        date: new Date().toISOString().split('T')[0],
        status: evaluation.status,
        normalizedScore: evaluation.normalizedScore
    };
    
    try {
        const athleteRef = db.collection('students').doc(currentAthlete.id);
        const doc = await athleteRef.get();
        
        if (!doc.exists) {
            console.error(`❌ Student ID [${currentAthlete.id}] not found in 'students' collection`);
            alert('❌ Спортсмен не найден');
            return;
        }
        
        const data = doc.data();
        const tests = data.tests || { physical: {}, functional: {} };
        if (!tests.physical) tests.physical = {};
        tests.physical[currentTest.testId] = testData;
        
        await athleteRef.update({ tests });
        
        console.log('✅ Тест сохранен в коллекции students');
        
        // ✅ ПЕРЕСЧЕТ КСР
        await recalculateKSR(currentAthlete.id);
        
        // Обновляем локальные данные
        currentAthlete.tests = tests;
        
        closeTestModal();
        renderTests(currentNorms, currentAthlete);
        
        alert('✅ Результат сохранен и КСР обновлен!');
    } catch (error) {
        console.error('❌ Ошибка сохранения в коллекцию students:', error);
        alert('❌ Ошибка сохранения результата');
    }
});

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const athleteId = urlParams.get('id');
    
    console.log('🚀 Инициализация physical.html');
    console.log('📌 Athlete ID из URL:', athleteId);
    
    if (!athleteId) {
        console.error('❌ ID спортсмена не указан в URL');
        document.getElementById('tests-container').innerHTML = '<div class="error-message">ID спортсмена не указан в URL</div>';
        return;
    }
    
    try {
        console.log(`🔍 Поиск спортсмена в коллекции 'students' с ID: ${athleteId}`);
        
        const doc = await db.collection('students').doc(athleteId).get();
        
        if (!doc.exists) {
            console.error(`❌ Student ID [${athleteId}] not found in 'students' collection`);
            document.getElementById('tests-container').innerHTML = `
                <div class="error-message">
                    ❌ Спортсмен с ID <code>${athleteId}</code> не найден в коллекции 'students'
                </div>
            `;
            return;
        }
        
        currentAthlete = { id: doc.id, ...doc.data() };
        
        console.log(`✅ Спортсмен найден: ${currentAthlete.firstName} ${currentAthlete.lastName}`);
        console.log('📊 Данные спортсмена:', currentAthlete);
        
        document.getElementById('athlete-name').textContent = `${currentAthlete.firstName} ${currentAthlete.lastName} — Физическое развитие`;
        
        const allNorms = await loadNorms();
        
        if (allNorms.length === 0) {
            console.error('❌ Не удалось загрузить нормативы из Google Sheets');
            document.getElementById('tests-container').innerHTML = `
                <div class="error-message">
                    ❌ Не удалось загрузить нормативы из Google Sheets. Проверьте:
                    <ul style="margin-top: 12px; text-align: left;">
                        <li>Опубликована ли таблица (Файл → Опубликовать в Интернете)</li>
                        <li>Выбран ли формат CSV</li>
                        <li>Корректна ли ссылка NORMS_SHEET_URL</li>
                    </ul>
                </div>
            `;
            return;
        }
        
        currentNorms = getAthletNorms(allNorms, currentAthlete, 'physical');
        
        renderTests(currentNorms, currentAthlete);
        
    } catch (error) {
        console.error('❌ Критическая ошибка при инициализации:', error);
        document.getElementById('tests-container').innerHTML = `
            <div class="error-message">
                ❌ Ошибка загрузки данных: ${error.message}
                <br><br>
                Откройте консоль браузера (F12) для подробностей.
            </div>
        `;
    }
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
